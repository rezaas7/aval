<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#160814" />
  <title>تقدیم به محدثه</title>
  <style>
    :root {
      --bg1: #120610;
      --bg2: #1c0b1b;
      --bg3: #2a1030;
      --pink: #ff5c9d;
      --rose: #ff7ab8;
      --violet: #9b6cff;
      --gold: #ffd66b;
      --text: #fff7fb;
      --muted: rgba(255, 247, 251, 0.78);
      --glass: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.16);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 92, 157, 0.18), transparent 26%),
        radial-gradient(circle at 80% 20%, rgba(155, 108, 255, 0.18), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(255, 214, 107, 0.12), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(transparent 49.5%, rgba(255,255,255,0.03) 50%, transparent 50.5%),
        linear-gradient(90deg, transparent 49.5%, rgba(255,255,255,0.03) 50%, transparent 50.5%);
      background-size: 84px 84px;
      opacity: 0.14;
      mask-image: radial-gradient(circle at center, black 20%, transparent 100%);
    }

    .orb {
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(28px);
      opacity: 0.22;
      pointer-events: none;
      animation: drift 11s ease-in-out infinite;
    }

    .orb.one {
      top: -90px;
      left: -90px;
      background: radial-gradient(circle, rgba(255, 92, 157, 0.95), transparent 65%);
    }

    .orb.two {
      top: 10%;
      right: -100px;
      background: radial-gradient(circle, rgba(155, 108, 255, 0.9), transparent 65%);
      animation-duration: 13s;
    }

    .orb.three {
      bottom: -110px;
      left: 20%;
      background: radial-gradient(circle, rgba(255, 214, 107, 0.85), transparent 65%);
      animation-duration: 15s;
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(18px,-16px,0) scale(1.08); }
    }

    .wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      width: min(100%, 760px);
      border-radius: 28px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      transform: translateY(0);
      transition: transform .35s ease, box-shadow .35s ease;
    }

    .card:active { transform: scale(0.995); }

    .hero {
      text-align: center;
      padding: 24px 18px 16px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--gold));
      box-shadow: 0 0 16px rgba(255, 92, 157, 0.9);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6.5vw, 4rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .glow {
      background: linear-gradient(135deg, #fff 0%, var(--rose) 28%, var(--violet) 62%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .typed {
      min-height: 132px;
      max-width: 44ch;
      margin: 0 auto 8px;
      font-size: clamp(15px, 3.8vw, 18px);
      line-height: 2.05;
      color: var(--muted);
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      vertical-align: -0.2em;
      margin-right: 3px;
      border-radius: 2px;
      background: linear-gradient(var(--pink), var(--gold));
      animation: blink .8s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 18px 18px;
    }

    button {
      min-height: 62px;
      border: none;
      border-radius: 18px;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .15s ease, filter .2s ease;
    }

    .start {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      box-shadow: 0 16px 34px rgba(255, 92, 157, 0.25);
    }

    .surprise {
      background: linear-gradient(135deg, var(--gold), var(--rose));
      box-shadow: 0 16px 34px rgba(255, 214, 107, 0.18);
    }

    button:active { transform: scale(0.98); filter: brightness(1.04); }

    .panel {
      padding: 0 18px 18px;
      display: grid;
      gap: 12px;
    }

    .mini {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mini b {
      font-size: 14px;
      display: block;
      margin-bottom: 3px;
    }

    .mini span {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
    }

    .mini .icons {
      font-size: 18px;
      letter-spacing: 3px;
      white-space: nowrap;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 92, 157, 0.55);
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .progress i {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--pink), var(--violet), var(--gold));
      animation: fill 4s ease forwards;
    }

    @keyframes fill { to { width: 100%; } }

    .hint {
      padding: 0 18px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.9;
    }

    .heart {
      position: fixed;
      z-index: 5;
      pointer-events: none;
      font-size: 18px;
      animation: rise 1.5s ease-out forwards;
      filter: drop-shadow(0 0 10px rgba(255, 92, 157, 0.7));
    }

    @keyframes rise {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
      100% { transform: translate(-50%, -140px) scale(1.8); opacity: 0; }
    }

    .flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
    }

    .flash.on {
      animation: flash .45s ease-out;
    }

    @keyframes flash {
      0% { opacity: 0; }
      20% { opacity: 0.18; }
      100% { opacity: 0; }
    }

    .shake {
      animation: shake .35s linear 1;
    }

    @keyframes shake {
      0% { transform: translate(0,0); }
      20% { transform: translate(2px,-1px); }
      40% { transform: translate(-2px,2px); }
      60% { transform: translate(2px,1px); }
      80% { transform: translate(-1px,-2px); }
      100% { transform: translate(0,0); }
    }

    @media (max-width: 520px) {
      .card { border-radius: 24px; }
      .actions { grid-template-columns: 1fr; }
      .typed { min-height: 150px; }
      .mini { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>
  <div class="flash" id="flash"></div>

  <main class="wrap">
    <section class="card" id="card">
      <div class="hero">
        <div class="tag"><span class="dot"></span> تقدیم به محدثه</div>
        <h1><span class="glow">محدثه</span>، ماهگردمون مبارک ❤️</h1>
        <div class="typed" id="typed"></div>
      </div>

      <div class="actions">
        <button class="start" id="startBtn">شروع موسیقی</button>
        <button class="surprise" id="surpriseBtn">سوپرایز کن</button>
      </div>

      <div class="panel">
        <div class="mini">
          <div>
            <b>هر لمس، یک قلب برای تو</b>
            <span>این صفحه با اسم تو روشن‌تر می‌شود.</span>
          </div>
          <div class="icons">❤ ✦ ✨</div>
        </div>

        <div class="progress"><i></i></div>
      </div>

      <div class="hint">
        فایل <code>sm.mp3</code> باید کنار <code>index.html</code> باشد.  
        بعد از شروع، هر جای صفحه را لمس کنی، قلب و نور می‌سازد.
      </div>
    </section>
  </main>

  <audio id="music" loop preload="auto">
    <source src="sm.mp3" type="audio/mpeg">
  </audio>

  <script>
    const typed = document.getElementById('typed');
    const music = document.getElementById('music');
    const startBtn = document.getElementById('startBtn');
    const surpriseBtn = document.getElementById('surpriseBtn');
    const flash = document.getElementById('flash');
    const card = document.getElementById('card');

    const lines = [
      "عزیزترینم، محدثه...",
      "یک ماه گذشت، پر از حس‌های تازه و قشنگ.",
      "توی این ۳۰ روز یاد گرفتم که چطور با تو خوشبخت‌ترین آدم دنیا باشم.",
      "این صفحه یه هدیه کوچیک از طرف منه،",
      "برای اینکه بدونی ضربان قلب من، با اسم تو تنظیم شده.",
      "هرجا که لمسش کنی، یه قلب برای تو میسازه..."
    ];

    let started = false;

    function typeText(index = 0, charIndex = 0) {
      if (index >= lines.length) return;
      const current = lines[index];
      typed.innerHTML = current.slice(0, charIndex) + '<span class="cursor"></span>';

      const speed = charIndex < current.length ? 42 : 650;
      if (charIndex < current.length) {
        setTimeout(() => typeText(index, charIndex + 1), speed);
      } else {
        setTimeout(() => typeText(index + 1, 0), speed);
      }
    }

    function heartAt(x, y) {
      const el = document.createElement('div');
      el.className = 'heart';
      const hearts = ['❤', '💖', '✨', '💘'];
      el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.fontSize = (16 + Math.random() * 18) + 'px';
      el.style.color = ['#ff5c9d', '#ff7ab8', '#9b6cff', '#ffd66b'][Math.floor(Math.random() * 4)];
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }

    function burst(x, y) {
      flash.classList.remove('on');
      void flash.offsetWidth;
      flash.classList.add('on');

      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');

      for (let i = 0; i < 12; i++) {
        setTimeout(() => {
          heartAt(
            x + (Math.random() * 80 - 40),
            y + (Math.random() * 50 - 25)
          );
        }, i * 32);
      }

      if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
    }

    function startExperience() {
      if (started) return;
      started = true;
      music.volume = 0.9;
      music.play().catch(() => {});
      typeText();

      document.body.addEventListener('pointerdown', (e) => {
        heartAt(e.clientX, e.clientY);
        if (navigator.vibrate) navigator.vibrate(16);
      }, { passive: true });
    }

    startBtn.addEventListener('click', () => {
      startExperience();
      burst(window.innerWidth * 0.5, window.innerHeight * 0.42);
    });

    surpriseBtn.addEventListener('click', () => {
      startExperience();
      const x = window.innerWidth * (0.42 + Math.random() * 0.2);
      const y = window.innerHeight * (0.35 + Math.random() * 0.18);
      burst(x, y);
      music.currentTime = Math.min((music.duration || 0), music.currentTime + 2);
      music.play().catch(() => {});
    });
  </script>
</body>
</html>
