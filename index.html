<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#160814" />
  <title>ماهگردمون مبارک محدثه</title>
  <style>
    :root {
      --bg1: #120610;
      --bg2: #1c0b1b;
      --bg3: #2a1030;
      --pink: #ff5c9d;
      --rose: #ff7ab8;
      --violet: #9b6cff;
      --gold: #ffd66b;
      --text: #fff7fb;
      --muted: rgba(255, 247, 251, 0.78);
      --glass: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.16);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
      color: var(--text);
    }

    body {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .orb {
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(28px);
      opacity: 0.22;
      pointer-events: none;
      animation: drift 11s ease-in-out infinite;
      z-index: 0;
    }

    .orb.one {
      top: -90px;
      left: -90px;
      background: radial-gradient(circle, var(--pink), transparent 65%);
    }

    .orb.two {
      top: 10%;
      right: -100px;
      background: radial-gradient(circle, var(--violet), transparent 65%);
      animation-duration: 13s;
    }

    @keyframes drift {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08) translate(20px, -20px); }
    }

    .wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      width: min(100%, 760px);
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 30px 24px;
      text-align: center;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 35%, rgba(255,255,255,0.03));
      pointer-events: none;
    }

    .counter-box {
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .counter-num {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(to bottom, #fff, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s ease, filter 0.2s ease, text-shadow 0.2s ease;
      display: inline-block;
      will-change: transform;
    }

    .counter-num.active-30 {
      animation: pulse30 0.7s ease;
      text-shadow: 0 0 18px rgba(255, 214, 107, 0.95), 0 0 36px rgba(255, 92, 157, 0.7);
    }

    .counter-num.sparkle {
      filter: brightness(1.25) saturate(1.35);
    }

    @keyframes pulse30 {
      0%   { transform: scale(1); }
      25%  { transform: scale(1.18) rotate(-3deg); }
      50%  { transform: scale(0.98) rotate(2deg); }
      75%  { transform: scale(1.22) rotate(-2deg); }
      100% { transform: scale(1); }
    }

    .counter-text {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .hero {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      margin: 0 0 15px;
      line-height: 1.5;
    }

    .glow {
      background: linear-gradient(135deg, #fff, var(--rose), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .typed {
      min-height: 120px;
      font-size: 1.08rem;
      line-height: 1.9;
      color: var(--muted);
      margin: 20px 0 10px;
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--pink);
      vertical-align: -2px;
      animation: blink 0.8s step-end infinite;
      border-radius: 4px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }

    button {
      padding: 15px 30px;
      border: none;
      border-radius: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: transform 0.25s ease, opacity 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.18);
      font-size: 1rem;
    }

    button:active {
      transform: scale(0.95);
    }

    .start {
      background: linear-gradient(135deg, var(--pink), var(--violet));
    }

    .start:hover {
      box-shadow: 0 12px 28px rgba(255, 92, 157, 0.25);
    }

    .heart {
      position: fixed;
      z-index: 5;
      pointer-events: none;
      animation: rise 1.5s ease-out forwards;
      font-size: 20px;
      will-change: transform, opacity;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translateY(-150px) scale(1.5);
        opacity: 0;
      }
    }

    .flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.18), transparent 55%);
      opacity: 0;
      z-index: 4;
    }

    .flash.on {
      animation: flashPop 0.6s ease;
    }

    @keyframes flashPop {
      0% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 18px;
        border-radius: 22px;
      }

      .typed {
        min-height: 140px;
        font-size: 1rem;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="flash" id="flash"></div>

  <main class="wrap">
    <section class="card" id="card">
      <div class="counter-box">
        <div class="counter-num" id="counter">0</div>
        <div class="counter-text">روز در کنار هم...</div>
      </div>

      <div class="hero">
        <h1>ماهگردمون مبارک <span class="glow">محدثه</span> عزیز ❤️</h1>
        <div class="typed" id="typed"></div>
      </div>

      <div class="actions">
        <button class="start" id="startBtn">شروع سورپرایز</button>
      </div>
    </section>
  </main>

  <audio id="music" loop>
    <source src="sm.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const counter = document.getElementById('counter');
    const typed = document.getElementById('typed');
    const music = document.getElementById('music');
    const startBtn = document.getElementById('startBtn');
    const flash = document.getElementById('flash');

    const lines = [
      "یک ماه پیش، دنیای من با تو قشنگ‌تر شد.",
      "توی این ۳۰ روز، هر لبخندت برای من یک خاطره بود.",
      "تو دلیل آرامش و هیجان قشنگ قلبمی.",
      "این سورپرایز کوچیک فقط برای توئه، محدثه عزیز..."
    ];

    let started = false;
    let counterReached30 = false;

    function vibrate(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function createHeart(x, y, emoji) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.innerHTML = emoji || ['❤', '💖', '✨', '💘'][Math.floor(Math.random() * 4)];
      h.style.left = x + 'px';
      h.style.top = y + 'px';
      const dx = (Math.random() - 0.5) * 60;
      const dy = -80 - Math.random() * 90;
      const rot = (Math.random() - 0.5) * 35;
      const scale = 0.9 + Math.random() * 0.8;
      h.style.transform = `translate(0,0) rotate(${rot}deg) scale(${scale})`;
      document.body.appendChild(h);

      requestAnimationFrame(() => {
        h.style.transition = 'transform 1.5s ease-out, opacity 1.5s ease-out';
        h.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg) scale(${scale + 0.5})`;
        h.style.opacity = '0';
      });

      setTimeout(() => h.remove(), 1550);
    }

    function burstHearts(x, y, amount = 16) {
      const emojis = ['❤️', '💖', '✨', '💘'];
      for (let i = 0; i < amount; i++) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

        const angle = (Math.PI * 2 * i) / amount;
        const dist = 30 + Math.random() * 80;
        const offsetX = Math.cos(angle) * dist;
        const offsetY = Math.sin(angle) * dist;

        h.style.left = x + 'px';
        h.style.top = y + 'px';
        h.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${0.85 + Math.random() * 0.7})`;
        document.body.appendChild(h);

        requestAnimationFrame(() => {
          h.style.transition = 'transform 1.4s ease-out, opacity 1.4s ease-out';
          h.style.transform = `translate(${offsetX * 1.25}px, ${offsetY - 120}px) scale(${1.2 + Math.random() * 0.4})`;
          h.style.opacity = '0';
        });

        setTimeout(() => h.remove(), 1500);
      }
    }

    function animateCounter() {
      let count = 0;
      counter.textContent = '0';
      counterReached30 = false;

      const timer = setInterval(() => {
        count++;
        counter.textContent = count;

        if (count >= 30) {
          clearInterval(timer);
          counterReached30 = true;
          counter.classList.add('active-30');
          setTimeout(() => counter.classList.remove('active-30'), 900);
        }
      }, 50);
    }

    function typeText(lineIdx = 0, charIdx = 0) {
      if (lineIdx >= lines.length) {
        typed.innerHTML = lines[lines.length - 1] + '<span class="cursor"></span>';
        return;
      }

      typed.innerHTML = lines[lineIdx].slice(0, charIdx) + '<span class="cursor"></span>';

      if (charIdx < lines[lineIdx].length) {
        setTimeout(() => typeText(lineIdx, charIdx + 1), 40);
      } else {
        setTimeout(() => typeText(lineIdx + 1, 0), 1000);
      }
    }

    function runSpecialThirtyEffect() {
      const rect = counter.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;

      counter.classList.add('sparkle');
      counter.classList.add('active-30');
      flash.classList.remove('on');
      void flash.offsetWidth;
      flash.classList.add('on');

      burstHearts(x, y, 24);
      vibrate([40, 30, 40, 30, 60]);

      setTimeout(() => {
        counter.classList.remove('sparkle');
        counter.classList.remove('active-30');
      }, 900);
    }

    counter.addEventListener('click', (e) => {
      if (counter.textContent === '30' && started) {
        e.stopPropagation();
        runSpecialThirtyEffect();
      }
    });

    startBtn.addEventListener('click', async () => {
      if (started) return;
      started = true;

      startBtn.style.opacity = '0';
      startBtn.style.pointerEvents = 'none';

      try {
        await music.play();
      } catch (err) {
        // Autoplay may be blocked until user interaction; click already counts as interaction.
      }

      vibrate(30);
      animateCounter();
      typeText();
    });

    document.body.addEventListener('click', (e) => {
      const targetIsCounter = e.target === counter || counter.contains(e.target);
      const targetIsButton = e.target === startBtn;
      if (!targetIsCounter && !targetIsButton) {
        createHeart(e.clientX, e.clientY);
      }
    });
  </script>
</body>
</html>
